<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Scene Cooker</title>

    <link href="../dist/output.css" rel="stylesheet" />
  </head>

  <body class="capitalize m-0 p-0 text-white">
    <header class="bg-[#2a2a40] sticky h-[10vh]">
      <img
        src="../images/logo.png"
        alt="logo"
        class="h-10 scale-300 pl-5 pt-4"
      />
    </header>

    <main
      class="bg-[#1e1e2f] flex flex-col justify-center items-center h-[85vh]"
    >
      <p class="text-3xl font-bold text-[#eaeaf0]">
        welcome to autonomous examination
      </p>
      <p class="pt-5 font-extralight text-[#a0a3bd]">
        please choose wheather to login or create new account
      </p>
      <div class="pt-8 flex gap-6 capitalize text-center">
        <a href="login.html">
          <button
            class="bg-[#4cc9f0] hover:bg-[#3caacb] h-12 w-20 text-center rounded"
          >
            login
          </button>
        </a>
        <a href="register.html">
          <button
            class="bg-[#2a2a40] hover:bg-[#3a3a55] h-12 w-25 text-center rounded"
          >
            register
          </button>
        </a>
      </div>
    </main>

    <footer class="bg-[#1e1e2f] h-[5vh] flex justify-center items-center">
      <p class="font-light text-xs">Autonomous Examination - © 2026</p>
    </footer>
    <script src="../script.js"></script>
  </body>
</html>
